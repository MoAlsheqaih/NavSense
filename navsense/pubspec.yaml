name: navsense
description: NavSense Indoor Navigation System — Flutter mobile application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_blue_plus: ^1.35.5
  flutter_beacon: ^0.5.1
  provider: ^6.0.5
  get_it: ^7.2.0
  uuid: ^3.0.7
  shared_preferences: ^2.0.15
  intl: ^0.20.2
  flutter_compass: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  generate: true
